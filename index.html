<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitalidad Itinerante</title>
<!-- Título optimizado para WhatsApp -->
<meta property="og:title" content="Vitalidad Itinerante - Tu guía de opciones sin crueldad" />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://cesar-mora.github.io/Vitalidad_Itinerante/" />
<!-- Cambia esta URL por la de tu miniatura -->
<meta property="og:image" content="https://raw.githubusercontent.com/cesar-mora/Vitalidad_Itinerante/main/fotos/encabezado.png" />
<!-- Descripción que aparecerá debajo del título -->
<meta property="og:description" content="Descubre restaurantes, tiendas y emprendimientos veganos. Tu guía de opciones sin crueldad." />
<!-- El nombre del sitio no es obligatorio, pero ayuda -->
<meta property="og:site_name" content="Vitalidad Itinerante" />

<!-- También puedes añadir esta etiqueta para Twitter (opcional) -->
<meta name="twitter:card" content="summary_large_image" />




<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBF7EC;
    --paper-dim:#F2ECDC;
    --ink:#22261B;
    --avocado:#5F7A45;
    --avocado-dk:#3F5330;
    --beet:#8C3B4A;
    --turmeric:#D99A2B;
    --line:#DAD2B7;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Work Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{font-family:'Fraunces', serif; margin:0;}
  .mono{font-family:'IBM Plex Mono', monospace; letter-spacing:.03em;}

  /* HERO */
  .hero{
    padding:64px 24px 40px;
    max-width:1000px;
    margin:0 auto;
    text-align:center;
    border-bottom:1px solid var(--line);
  }
  .hero .eyebrow{
    font-size:.75rem;
    text-transform:uppercase;
    color:var(--beet);
    letter-spacing:.14em;
    margin-bottom:14px;
    display:inline-block;
  }
  .hero h1{
    font-size:clamp(2.4rem, 5vw, 4rem);
    font-weight:700;
    line-height:1.05;
    color:var(--avocado-dk);
  }
  .hero h1 em{
    font-style:italic;
    font-weight:500;
    color:var(--beet);
  }
  .hero p{
    max-width:560px;
    margin:18px auto 0;
    font-size:1.05rem;
    color:#4a4a3a;
  }

  /* FILTER TICKET */
  .filters{
    max-width:1000px;
    margin:-1px auto 0;
    padding:28px 24px;
    display:flex;
    flex-wrap:wrap;
    gap:16px;
    align-items:flex-end;
    justify-content:center;
    background:var(--paper-dim);
    border-bottom:1px dashed var(--line);
  }
  .field{ display:flex; flex-direction:column; gap:6px; min-width:180px; }
  .field label{
    font-size:.72rem;
    text-transform:uppercase;
    letter-spacing:.1em;
    color:var(--avocado-dk);
    font-weight:600;
  }
  select, input[type=text]{
    font-family:'Work Sans', sans-serif;
    font-size:.95rem;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:2px;
    background:var(--paper);
    color:var(--ink);
  }
  select:focus, input:focus{ outline:2px solid var(--avocado); outline-offset:1px; }
  .clear-btn{
    background:none;
    border:1px solid var(--beet);
    color:var(--beet);
    padding:10px 16px;
    font-family:'Work Sans', sans-serif;
    font-size:.85rem;
    cursor:pointer;
    border-radius:2px;
    height:41px;
  }
  .clear-btn:hover{ background:var(--beet); color:var(--paper); }
  .count{
    max-width:1000px;
    margin:20px auto 0;
    padding:0 24px;
    font-size:.85rem;
    color:#6a6a55;
  }

  /* GRID */
  .grid{
    max-width:1000px;
    margin:16px auto 80px;
    padding:0 24px;
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(270px, 1fr));
    gap:24px;
  }
  .card{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:3px;
    overflow:hidden;
    cursor:pointer;
    transition:transform .18s ease, box-shadow .18s ease;
    display:flex;
    flex-direction:column;
  }
  .card:hover{ transform:translateY(-3px); box-shadow:0 10px 24px rgba(34,38,27,.10); }
  .card img{ width:100%; height:170px; object-fit:cover; display:block; }
  .card-body{ padding:16px 18px 18px; display:flex; flex-direction:column; gap:8px; flex:1;}
  .tag-row{ display:flex; justify-content:space-between; align-items:center; }
  .locale{ font-size:.72rem; color:var(--avocado-dk); font-weight:600; }
  .stamp{
    font-size:.7rem;
    border:1px solid var(--turmeric);
    color:var(--turmeric);
    padding:2px 8px;
    border-radius:20px;
    white-space:nowrap;
  }
  .card h3{ font-size:1.25rem; color:var(--ink); font-weight:600; }
  .card p.excerpt{ font-size:.88rem; color:#5a5a48; line-height:1.5; margin:0; flex:1;}
  .card .price{ font-size:.8rem; color:var(--beet); }

  .empty{
    max-width:1000px; margin:40px auto; padding:0 24px;
    text-align:center; color:#7a7a65; font-size:.95rem;
  }

  footer{
    text-align:center; padding:30px 24px 50px;
    font-size:.78rem; color:#8a8a75;
  }

  @media (prefers-reduced-motion: reduce){ .card{ transition:none; } }
</style>
</head>
<body>

  <div class="hero">
    <span class="eyebrow mono">reseñas · fotos · rutas veganas</span>
    <h1>Vitalidad Itinerante</h1>
    <p>Tu guía de opciones sin crueldad</p>
  </div>

  <div class="filters">
    <div class="field">
      <label for="region">Región</label>
      <select id="region"><option value="">Todas</option></select>
    </div>
    <div class="field">
      <label for="distrito">Distrito</label>
      <select id="distrito"><option value="">Todos</option></select>
    </div>
    <div class="field" style="flex:1; min-width:220px;">
      <label for="search">Buscar</label>
      <input type="text" id="search" placeholder="nombre del local...">
    </div>
    <button class="clear-btn" id="clear">Limpiar filtros</button>
  </div>

  <p class="count mono" id="count"></p>
  <div class="grid" id="grid"></div>
  <p class="empty" id="empty" style="display:none;">No hay locales con esos filtros todavía — prueba otra combinación.</p>

  <footer>Una página de "Vitalidad Catering Plant Based"</footer>

<script>
/* =========================================================
   AGREGA TUS LOCALES AQUÍ. Copia un bloque {} y cambia los datos.
   - foto: usa cualquier URL de imagen (Drive público, Imgur, etc.)
   - link: Instagram, YouTube o Google Maps
   ========================================================= */
const PLACES = [
  {
    nombre: "Vida Sana",
    region: "Lima",
    distrito: "Lima (Cercado)",
    precio: "S/ 14 - 20",
    calificacion: "4",
    foto: "https://raw.githubusercontent.com/cesar-mora/Vitalidad_Itinerante/main/fotos/vida-sana/IMG-20260629-WA0024.jpg",
    direccion: "Jirón Camaná 399. Cruce con Jirón Ica",
    resumen: "Clásico vegetariano con menú y preparaciones a la carta",
    pagina: "resenas/vida-sana-camana.html"
  }

  /* Cuando tengas un nuevo local, copia el bloque de arriba (con la coma antes)
     y cambia los datos. El campo "pagina" debe apuntar al archivo .html
     de su reseña dentro de la carpeta "resenas". Ejemplo:

  ,{
    nombre: "Nombre del local",
    region: "Región",
    distrito: "Distrito",
    precio: "S/ 20 - 30",
    calificacion: "4.5",
    foto: "URL de la foto de portada",
    resumen: "Una frase corta que resuma el local (aparece en la tarjeta).",
    pagina: "resenas/nombre-del-local.html"
  }
  */
];

const regionSel = document.getElementById('region');
const distritoSel = document.getElementById('distrito');
const searchInput = document.getElementById('search');
const grid = document.getElementById('grid');
const countEl = document.getElementById('count');
const emptyEl = document.getElementById('empty');

function uniqueSorted(arr){ return [...new Set(arr)].sort((a,b)=>a.localeCompare(b,'es')); }

function populateRegions(){
  const regions = uniqueSorted(PLACES.map(p=>p.region));
  regions.forEach(r=>{
    const o = document.createElement('option');
    o.value = r; o.textContent = r;
    regionSel.appendChild(o);
  });
}

function populateDistritos(regionFilter){
  distritoSel.innerHTML = '<option value="">Todos</option>';
  const source = regionFilter ? PLACES.filter(p=>p.region===regionFilter) : PLACES;
  uniqueSorted(source.map(p=>p.distrito)).forEach(d=>{
    const o = document.createElement('option');
    o.value = d; o.textContent = d;
    distritoSel.appendChild(o);
  });
}

function card(p, idx){
  const el = document.createElement('div');
  el.className = 'card';
  el.innerHTML = `
    <img src="${p.foto}" alt="${p.nombre}" loading="lazy">
    <div class="card-body">
      <div class="tag-row">
        <span class="locale mono">${p.distrito}, ${p.region}</span>
        <span class="stamp mono">★ ${p.calificacion}</span>
      </div>
      <h3>${p.nombre}</h3>
      <p class="excerpt" style="font-size:0.8rem; color:var(--avocado-dk); margin-bottom:4px;">
        📍 ${p.direccion}
      </p>
      <p class="excerpt">${p.resumen}</p>
      <span class="price mono">${p.precio}</span>
    </div>`;
  el.addEventListener('click', ()=>{ window.location.href = p.pagina; });
  return el;
}

function render(){
  const r = regionSel.value, d = distritoSel.value, q = searchInput.value.trim().toLowerCase();
  const filtered = PLACES.filter(p=>
    (!r || p.region===r) &&
    (!d || p.distrito===d) &&
    (!q || p.nombre.toLowerCase().includes(q))
  );
  grid.innerHTML = '';
  filtered.forEach((p,i)=>grid.appendChild(card(p,i)));
  countEl.textContent = `${filtered.length} local${filtered.length===1?'':'es'} encontrado${filtered.length===1?'':'s'}`;
  emptyEl.style.display = filtered.length ? 'none' : 'block';
}

regionSel.addEventListener('change', ()=>{ populateDistritos(regionSel.value); render(); });
distritoSel.addEventListener('change', render);
searchInput.addEventListener('input', render);
document.getElementById('clear').addEventListener('click', ()=>{
  regionSel.value=''; populateDistritos(''); distritoSel.value=''; searchInput.value=''; render();
});

populateRegions();
populateDistritos('');
render();
</script>
</body>
</html>
